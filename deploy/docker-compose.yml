services:
  julia-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: biocircuits-explorer-julia
    restart: unless-stopped
    expose:
      - "8088"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  nginx:
    image: nginx:alpine
    container_name: biocircuits-explorer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../webapp/public:/usr/share/nginx/html/public:ro
      - "${BIOCIRCUITS_EXPLORER_SECRETS_DIR:-/opt/rop-explorer-secrets}/certs:/etc/nginx/ssl:ro"
    depends_on:
      julia-app:
        condition: service_healthy
