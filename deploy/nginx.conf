limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream julia_app {
    server julia-app:8088;
}

server {
    listen 80;
    server_name biocircuits-explorer.com www.biocircuits-explorer.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name biocircuits-explorer.com www.biocircuits-explorer.com;

    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 1m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Serve static files directly
    location ~* \.(html|js|css|png|svg|gif|ico|json)$ {
        root /usr/share/nginx/html/public;
        expires 1h;
        try_files $uri @julia;
    }

    # API requests with rate limiting and extended timeout
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://julia_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Default: proxy to Julia
    location @julia {
        proxy_pass http://julia_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://julia_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
